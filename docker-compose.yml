services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tiescolar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tiescolar}
      POSTGRES_DB: ${POSTGRES_DB:-tiescolar}
    ports:
      # Porta do host configurável (DB_PORT) para rodar worktrees em paralelo;
      # 5433 (default) evita conflito com um Postgres local já em execução.
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tiescolar} -d ${POSTGRES_DB:-tiescolar}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://tiescolar:tiescolar@db:5432/tiescolar}
    ports:
      # Porta do host configurável (BACKEND_PORT) para rodar worktrees em paralelo.
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    # Aplica migrations, faz o seed e sobe a API com reload.
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  web:
    build: ./web
    environment:
      # No browser usamos localhost; o backend é exposto na porta BACKEND_PORT do host.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      # Porta do host configurável (WEB_PORT) para rodar worktrees em paralelo.
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - backend
    volumes:
      - ./web:/app
      - /app/node_modules

volumes:
  pgdata:
