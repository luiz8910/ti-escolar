services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tiescolar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tiescolar}
      POSTGRES_DB: ${POSTGRES_DB:-tiescolar}
    ports:
      # 5433 no host evita conflito com um Postgres local já em execução.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tiescolar} -d ${POSTGRES_DB:-tiescolar}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://tiescolar:tiescolar@db:5432/tiescolar}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    # Aplica migrations, faz o seed e sobe a API com reload.
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  web:
    build: ./web
    environment:
      # No browser usamos localhost; o backend é exposto na porta 8000 do host.
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./web:/app
      - /app/node_modules

volumes:
  pgdata:
